name: Quantum Teleportation CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Run Teleportation Tests
      run: |
        python kaynak/isinlanma_test.py
    - name: Run Gate Teleportation Tests
      run: |
        python kaynak/gate_teleportation.py
    - name: Run Noise Analysis Tests
      run: |
        python kaynak/gurultu_analizi.py
    - name: Run Entanglement Swapping Tests
      run: |
        python kaynak/dolaniklik_takasi.py
